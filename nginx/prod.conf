upstream homswag_app {
    server app:3000;
}

upstream homswag_admin {
    server admin:80;
}

upstream homswag_api {
    server server:3000;
}

server {
    listen 80;
    server_name alpha.homswag.com admin.alpha.homswag.com api.alpha.homswag.com;

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name alpha.homswag.com;

    ssl_certificate /etc/nginx/certs/alpha.homswag.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/alpha.homswag.com/privkey.pem;

    location / {
        proxy_pass http://homswag_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

server {
    listen 443 ssl http2;
    server_name admin.alpha.homswag.com;

    ssl_certificate /etc/nginx/certs/admin.alpha.homswag.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/admin.alpha.homswag.com/privkey.pem;

    location / {
        proxy_pass http://homswag_admin;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

server {
    listen 443 ssl http2;
    server_name api.alpha.homswag.com;

    ssl_certificate /etc/nginx/certs/api.alpha.homswag.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/api.alpha.homswag.com/privkey.pem;

    client_max_body_size 50m;

    location / {
        proxy_pass http://homswag_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}