# HomSwag — Docker/Podman Compose
# Images pulled from GHCR — no local build required
# Ports: server ${SERVER_PORT:-3000} | admin ${ADMIN_PORT:-3001} | app ${APP_PORT:-3002}

services:

  # ────────────────────────────────────────────────────────────────
  # Infrastructure
  # ────────────────────────────────────────────────────────────────

  mongodb:
    image: docker.io/mongo:8
    container_name: homswag-mongodb
    restart: unless-stopped
    ports:
      - "${MONGO_PORT:-27017}:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-changeme}
      MONGO_INITDB_DATABASE: homswag
    volumes:
      - ${MONGODB_DATA_SOURCE:-mongodb-data}:/data/db
      - mongodb-config:/data/configdb
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - homswag-net

  redis:
    image: docker.io/redis:7-alpine
    container_name: homswag-redis
    restart: unless-stopped
    # redis is internal only — no external port exposed
    command:
      - redis-server
      - "--requirepass"
      - "${REDIS_PASSWORD:-changeme}"
      - "--appendonly"
      - "yes"
      - "--appendfsync"
      - "everysec"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - homswag-net

  minio:
    image: docker.io/minio/minio:latest
    container_name: homswag-minio
    restart: unless-stopped
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-changeme}
    command: minio server /data --console-address ":9001"
    volumes:
      - ${MINIO_DATA_SOURCE:-minio-data}:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - homswag-net

  # ────────────────────────────────────────────────────────────────
  # Applications (pre-built images — pulled from GHCR)
  # ────────────────────────────────────────────────────────────────

  server:
    image: ghcr.io/jeraldvictor/hom-swag-server:${SERVER_IMAGE_TAG:-latest}
    pull_policy: always
    container_name: homswag-server
    restart: unless-stopped
    ports:
      - "${SERVER_PORT:-3000}:3000"
    env_file:
      - ${DEPLOY_ENV_FILE:-.env.local}
    volumes:
      - ${DEPLOY_ENV_FILE:-.env.local}:/app/.env:ro
      - ${UPLOAD_SOURCE:-./uploads}:/app/uploads
      - ${LOG_PATH:-./logs}:/app/logs
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - homswag-net

  admin:
    image: ghcr.io/jeraldvictor/hom-swag-admin:${ADMIN_IMAGE_TAG:-latest}
    pull_policy: always
    container_name: homswag-admin
    restart: unless-stopped
    ports:
      - "${ADMIN_PORT:-3001}:80"
    networks:
      - homswag-net

  app:
    image: ghcr.io/jeraldvictor/hom-swag-app:${APP_IMAGE_TAG:-latest}
    pull_policy: always
    container_name: homswag-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3002}:3000"
    env_file:
      - ${DEPLOY_ENV_FILE:-.env.local}
    networks:
      - homswag-net

# ────────────────────────────────────────────────────────────────
# Named volumes (survive container restarts / rebuilds)
# ────────────────────────────────────────────────────────────────
volumes:
  mongodb-data:
  mongodb-config:
  redis-data:
  minio-data:

# ────────────────────────────────────────────────────────────────
# Internal network
# ────────────────────────────────────────────────────────────────
networks:
  homswag-net:
    driver: bridge
    name: homswag-net
